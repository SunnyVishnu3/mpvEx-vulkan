name: Make release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  # This enables the manual "Run workflow" button in the GitHub Actions tab!
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag (e.g., v1.3.0)'
        required: true
        default: 'v1.3.0'

jobs:
  release-for-github:
    name: "Release for GitHub"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build standard release with Gradle
        run: ./gradlew assembleStandardRelease --stacktrace

      - name: Build Play Store release with Gradle
        run: ./gradlew assemblePlaystoreRelease --stacktrace

      - name: Build F-Droid release with Gradle
        run: ./gradlew assembleFdroidRelease --stacktrace

      - name: Get tag name
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION_TAG=${{ github.event.inputs.version_tag }}" >> $GITHUB_ENV
          else
            echo "VERSION_TAG=$(basename $GITHUB_REF)" >> $GITHUB_ENV
          fi

      - name: Sign all APKs dynamically
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          # 1. Decode the Keystore from GitHub Secrets
          echo $KEYSTORE_BASE64 | base64 --decode > my-release-key.jks
          
          # 2. Find the Android build-tools apksigner
          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools"
          LATEST_BUILD_TOOLS=$(ls -1 "$BUILD_TOOLS_DIR" | sort -n | tail -1)
          APKSIGNER="$BUILD_TOOLS_DIR/$LATEST_BUILD_TOOLS/apksigner"
          
          # 3. Loop through every single built APK and sign it natively
          find app/build/outputs/apk -name "*.apk" -type f | while read apk; do
            echo "Signing $apk..."
            $APKSIGNER sign --ks my-release-key.jks \
                            --ks-key-alias "$KEY_ALIAS" \
                            --ks-pass "pass:$STORE_PASSWORD" \
                            --key-pass "pass:$KEY_PASSWORD" \
                            "$apk"
          done
          
          # 4. Delete the keystore file for security
          rm my-release-key.jks

      - name: Verify build output and Rename
        run: |
          STANDARD_RELEASE_DIR="app/build/outputs/apk/standard/release"
          PLAYSTORE_RELEASE_DIR="app/build/outputs/apk/playstore/release"
          FDROID_RELEASE_DIR="app/build/outputs/apk/fdroid/release"
          
          if [ ! -d "$STANDARD_RELEASE_DIR" ] || [ ! -d "$PLAYSTORE_RELEASE_DIR" ] || [ ! -d "$FDROID_RELEASE_DIR" ]; then
            echo "One or more release directories not found."
            exit 1
          fi
          
          # Rename APKs using the VERSION_TAG (The files are now securely signed!)
          mv "$STANDARD_RELEASE_DIR/app-standard-universal-release-unsigned.apk" "mpvEx-universal-${{ env.VERSION_TAG }}.apk"
          mv "$STANDARD_RELEASE_DIR/app-standard-arm64-v8a-release-unsigned.apk" "mpvEx-arm64-v8a-${{ env.VERSION_TAG }}.apk"
          mv "$STANDARD_RELEASE_DIR/app-standard-armeabi-v7a-release-unsigned.apk" "mpvEx-armeabi-v7a-${{ env.VERSION_TAG }}.apk"
          mv "$STANDARD_RELEASE_DIR/app-standard-x86-release-unsigned.apk" "mpvEx-x86-${{ env.VERSION_TAG }}.apk"
          mv "$STANDARD_RELEASE_DIR/app-standard-x86_64-release-unsigned.apk" "mpvEx-x86_64-${{ env.VERSION_TAG }}.apk"
          
          mv "$PLAYSTORE_RELEASE_DIR/app-playstore-universal-release-unsigned.apk" "mpvEx-playstore-${{ env.VERSION_TAG }}.apk"
          mv "$FDROID_RELEASE_DIR/app-fdroid-arm64-v8a-release-unsigned.apk" "mpvEx-fdroid-${{ env.VERSION_TAG }}.apk"

      - name: Calculate SHA256
        run: |
          echo "apk_universal_sha256=$(sha256sum mpvEx-universal-${{ env.VERSION_TAG }}.apk | cut -d ' ' -f 1)" >> $GITHUB_ENV
          echo "apk_arm64_v8a_sha256=$(sha256sum mpvEx-arm64-v8a-${{ env.VERSION_TAG }}.apk | cut -d ' ' -f 1)" >> $GITHUB_ENV
          echo "apk_armeabi_v7a_sha256=$(sha256sum mpvEx-armeabi-v7a-${{ env.VERSION_TAG }}.apk | cut -d ' ' -f 1)" >> $GITHUB_ENV
          echo "apk_x86_sha256=$(sha256sum mpvEx-x86-${{ env.VERSION_TAG }}.apk | cut -d ' ' -f 1)" >> $GITHUB_ENV
          echo "apk_x86_64_sha256=$(sha256sum mpvEx-x86_64-${{ env.VERSION_TAG }}.apk | cut -d ' ' -f 1)" >> $GITHUB_ENV
          echo "apk_playstore_sha256=$(sha256sum mpvEx-playstore-${{ env.VERSION_TAG }}.apk | cut -d ' ' -f 1)" >> $GITHUB_ENV
          echo "apk_fdroid_sha256=$(sha256sum mpvEx-fdroid-${{ env.VERSION_TAG }}.apk | cut -d ' ' -f 1)" >> $GITHUB_ENV

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: mpvEx ${{ env.VERSION_TAG }}
          generate_release_notes: true
          body: |
            ## Architecture Guide
            
            Not sure which file to download?
            - `mpvEx-universal-...apk`: Works on **all devices** (Recommended if unsure, but larger file size).
            - `mpvEx-arm64-v8a-...apk`: For **modern Android devices** (Almost all phones from 2017 onwards).
            - `mpvEx-armeabi-v7a-...apk`: For **older Android devices** (32-bit).
            - `mpvEx-x86-...apk` / `x86_64`: For **Android Emulators** and some ChromeOS devices.
            
            ---\n
            ### Checksums (SHA-256)
            
            | Variant | Checksum |
            |---------|----------|
            | Universal | ${{ env.apk_universal_sha256 }} |
            | arm64-v8a | ${{ env.apk_arm64_v8a_sha256 }} |
            | armeabi-v7a | ${{ env.apk_armeabi_v7a_sha256 }} |
            | x86 | ${{ env.apk_x86_sha256 }} |
            | x86_64 | ${{ env.apk_x86_64_sha256 }} |
            | Play Store | ${{ env.apk_playstore_sha256 }} |
            | F-Droid | ${{ env.apk_fdroid_sha256 }} |
            
            ---
            ### Play Store Version
            
            The Play Store variant (`mpvEx-playstore-${{ env.VERSION_TAG }}.apk`) is specifically built for Google Play Store:
            - Universal APK supporting all architectures (arm64-v8a, armeabi-v7a, x86, x86_64)
            - Removed automatic update feature (handled by Play Store)
            - Minimal permissions for maximum compatibility
            
            ---
            ### F-Droid Version
            
            The F-Droid variant (`mpvEx-fdroid-${{ env.VERSION_TAG }}.apk`) is specifically built for F-Droid compatibility:
            - Removed automatic update feature
            - Removed install packages permission
            - ARM64-v8a architecture only
          files: |
            mpvEx-universal-${{ env.VERSION_TAG }}.apk
            mpvEx-arm64-v8a-${{ env.VERSION_TAG }}.apk
            mpvEx-armeabi-v7a-${{ env.VERSION_TAG }}.apk
            mpvEx-x86-${{ env.VERSION_TAG }}.apk
            mpvEx-x86_64-${{ env.VERSION_TAG }}.apk
            mpvEx-playstore-${{ env.VERSION_TAG }}.apk
            mpvEx-fdroid-${{ env.VERSION_TAG }}.apk
